name: Test Container Images

on:
  pull_request:
    paths:
      - "**/Dockerfile"
      - "tests/**"
  push:
    branches: [main]
    paths:
      - "**/Dockerfile"
      - "tests/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── aragorn ────────────────────────────────────────────
          - tool: aragorn
            version: "1.2.36"
          - tool: aragorn
            version: "1.2.38"
          - tool: aragorn
            version: "1.2.41"
          # ── trnascan-se ────────────────────────────────────────
          - tool: trnascan-se
            version: "2.0.0"
          - tool: trnascan-se
            version: "2.0.3"
          - tool: trnascan-se
            version: "2.0.5"
          - tool: trnascan-se
            version: "2.0.6"
          - tool: trnascan-se
            version: "2.0.7"
          - tool: trnascan-se
            version: "2.0.9"
          - tool: trnascan-se
            version: "2.0.11"
          - tool: trnascan-se
            version: "2.0.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.tool }}/${{ matrix.version }}
          load: true
          tags: test/${{ matrix.tool }}:${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run functional tests
        run: |
          chmod +x tests/${{ matrix.tool }}/test.sh
          tests/${{ matrix.tool }}/test.sh \
            "test/${{ matrix.tool }}:${{ matrix.version }}" \
            "${{ matrix.version }}"
